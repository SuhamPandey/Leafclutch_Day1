<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8</title>
        <style>
            .parent-container {
                position: relative;
                width: 200px;
                height: 300px;
                background-color: yellow;
            }
 
            .static-box {
                position: static;
                width: 100px;
                height: 100px;
                background-color: blue;
            }
 
            .relative-box {
                position: relative;
                width: 100px;
                height: 100px;
                background-color: green;
                top: 50px;
                left: 50px;
            }
 
            .absolute-box {
                position: absolute;
                width: 100px;
                height: 100px;
                background-color: red;
                top: 30px;
                left: 30px;
            }
            a{
            margin-top: 20px;
            font-size: larger;
            text-decoration: none;
            display: block;
        }
            </style>
</head>
<body>
    
        <div class="parent-container">
            <div class="static-box">Static</div>
            <div class="relative-box">Relative</div>
            <div class="absolute-box">Absolute</div>
        </div>
        <a href="./index.html">go back</a>
</body>
</html>
